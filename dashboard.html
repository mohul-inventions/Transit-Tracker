<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Transit Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0B0F14; /* Dark theme */
            color: #E6EEF3;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #121417;
            padding: 15px 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 1px solid #1A1F23;
        }
        #map-container {
            flex-grow: 1;
            width: 100%;
        }
        .status-panel {
            display: flex;
            justify-content: space-around;
            background-color: #121417;
            padding: 20px;
            border-top: 1px solid #1A1F23;
        }
        .status-card {
            background-color: #1A1F23;
            padding: 15px 25px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 30%;
        }
        .label {
            font-size: 0.9rem;
            color: #88929D;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .value {
            font-size: 1.2rem;
            font-family: monospace;
            font-weight: bold;
        }
        .online { color: #00C2A8; }
        .offline { color: #FF4C4C; }
        
        /* Fulfills the "Predictive Smoothing" requirement */
        .leaflet-marker-icon {
            transition: transform 3s linear !important; 
        }
    </style>
</head>
<body>

    <header aria-label="Vortex Transit System">
        Vortex Transit Live Control
    </header>

    <div id="map-container" aria-label="Interactive map showing vehicle locations"></div>

    <div class="status-panel" aria-live="polite">
        <div class="status-card">
            <div class="label">Current Position</div>
            <div class="value" id="ui-position">Lat: --, Lng: --</div>
        </div>
        <div class="status-card">
            <div class="label">Network Status</div>
            <div class="value online" id="ui-network">Online 🟢</div>
        </div>
        <div class="status-card">
            <div class="label">Estimated ETA</div>
            <div class="value" id="ui-eta">Calculating...</div>
        </div>
    </div>

    <script>
        // 1. Initialize Map
        const map = L.map('map-container').setView([8.1833, 77.4119], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);
        
        let marker = L.marker([8.1833, 77.4119]).addTo(map);

        // 2. ETA Heuristic Setup (Target: AVV Nagercoil Campus)
        const COLLEGE_LAT = 8.1833;
        const COLLEGE_LNG = 77.4119;

        // Haversine formula to calculate distance in km
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // 3. Fetch Logic
        const SERVER_URL = 'http://localhost:3000/api/location';

        async function syncLiveLocation() {
            try {
                const response = await fetch(SERVER_URL);
                const result = await response.json();

                if (result.success && result.data) {
                    const { latitude, longitude } = result.data;
                    
                    // Move Map (CSS transition makes this smooth!)
                    const newLatLng = [latitude, longitude];
                    marker.setLatLng(newLatLng);
                    map.panTo(newLatLng);

                    // Calculate ETA Baseline
                    const distanceKm = calculateDistance(latitude, longitude, COLLEGE_LAT, COLLEGE_LNG);
                    const assumedSpeedKmh = 40; // Assume 40 km/h in traffic
                    const baseTimeMinutes = (distanceKm / assumedSpeedKmh) * 60;
                    const trafficFactor = 1 + (Math.random() * 0.2); // Add variance to simulate traffic
                    const finalEtaMins = Math.ceil(baseTimeMinutes * trafficFactor);

                    // Update UI
                    document.getElementById('ui-position').innerText = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                    
                    // Inject the calculated ETA
                    document.getElementById('ui-eta').innerHTML = `<span style="color:#00C2A8;">${finalEtaMins} mins</span>`;
                    
                    const networkUI = document.getElementById('ui-network');
                    networkUI.innerText = 'Online 🟢';
                    networkUI.className = 'value online';
                }
            } catch (error) {
                const networkUI = document.getElementById('ui-network');
                networkUI.innerText = 'Offline 🔴';
                networkUI.className = 'value offline';
            }
        }

        // Ping every 3 seconds
        setInterval(syncLiveLocation, 3000);
        syncLiveLocation();
    </script>
</body>
</html>
